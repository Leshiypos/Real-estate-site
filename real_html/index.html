<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/fonts/helvetica/helvetica-font.css" />
    <link rel="stylesheet" href="./assets/fonts/ivymode/ivymode-font.css" />
    <link rel="stylesheet" href="./assets/libs/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script src="./assets/libs/swiper/swiper-bundle.min.js"></script>
    <script src="./assets/js/main.js"></script>
    <script src="./assets/js/sliders.js"></script>

    <title>Real Estate</title>
  </head>
  <body>
    <header>
      <div class="wrap_header">
        <a href="/" class="logo">
          <img src="./assets/images/icons/logo.svg" alt="logo" />
        </a>
        <nav class="main_menu">
          <ul>
            <li><a href="#">HOME</a></li>
            <li><a href="#">ABOUT BUILDING</a></li>
            <li><a href="#">GALLERY</a></li>
            <li><a href="#">FLOORS PLANS</a></li>
            <li><a href="#">HOVIRTUAL TOURME</a></li>
          </ul>
        </nav>
        <div class="btn_block">
          <a href="#" class="btn accent"
            ><div class="btn_wrap">Book a viewing</div></a
          >
        </div>
      </div>
    </header>
    <main>
      <!-- MARK: HERO SECTION -->
      <section class="hero_section">
        <div class="wrap_section">
          <video
            class="video_background"
            poster=""
            muted
            autoplay
            playsinline
            loop
          >
            <!-- Десктоп -->
            <source
              src="./assets/video/hero_video.mp4"
              type="video/mp4"
              media="(min-width: 1001px)"
            />
            <source
              src="./assets/video/hero_video.mp4"
              type="video/mp4"
              media="(max-width: 1000px)"
            />
          </video>
          <div class="logo_block">
            <img
              src="./assets/images/icons/logo_hero_section.svg"
              alt="hero lofo"
            />
            <div class="logo_description">Daynemic Offer Here</div>
          </div>
          <div class="content_block">
            <div class="wrap_content_block">
              <div class="col btn_block">
                <a href="#" class="btn white"
                  ><div class="btn_wrap">Leave a request</div></a
                >
                <a href="#" class="btn glass whith_arrow"
                  ><p>Learn More</p>
                  <img src="./assets/images/icons/arrow_diag.avif" alt="arrow"
                /></a>
              </div>
              <div class="col qr_block">
                <img src="./assets/images/QRcode.avif" alt="qr code" />
              </div>
            </div>
          </div>
          <div class="glass_line liquid-glass"></div>
        </div>
      </section>
    </main>
  </body>
</html>
